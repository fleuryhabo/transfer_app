<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransfertPro — Gestion des activités</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg2: #171b26;
    --bg3: #1e2433;
    --border: #2a3045;
    --border2: #3a4060;
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #545e72;
    --accent: #4f8ef7;
    --accent2: #2563eb;
    --green: #22c55e;
    --green-bg: #052e16;
    --red: #ef4444;
    --red-bg: #2d0a0a;
    --amber: #f59e0b;
    --amber-bg: #2d1f00;
    --purple: #a78bfa;
    --purple-bg: #1e1030;
    --teal: #2dd4bf;
    --teal-bg: #042f2e;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

  /* ---- LAYOUT ---- */
  #app { display: flex; min-height: 100vh; }
  #sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; bottom: 0; left: 0; overflow-y: auto; }
  #main { margin-left: 220px; flex: 1; min-height: 100vh; }
  @media (max-width: 768px) {
    #sidebar { width: 100%; position: relative; flex-direction: row; flex-wrap: wrap; overflow: visible; border-right: none; border-bottom: 1px solid var(--border); }
    #main { margin-left: 0; }
    .sidebar-nav { display: flex; flex-wrap: wrap; flex-direction: row; padding: 4px 8px; gap: 2px; }
    .sidebar-nav a { padding: 6px 10px; font-size: 12px; }
    .sidebar-logo { padding: 12px 16px; border-bottom: none; }
    .sidebar-user { display: none; }
  }

  /* ---- SIDEBAR ---- */
  .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
  .logo-text { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.05em; }
  .logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .sidebar-nav { padding: 8px; flex: 1; }
  .sidebar-nav a { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius); color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 400; transition: all 0.15s; cursor: pointer; margin-bottom: 2px; }
  .sidebar-nav a:hover { background: var(--bg3); color: var(--text); }
  .sidebar-nav a.active { background: var(--bg3); color: var(--accent); border-left: 2px solid var(--accent); padding-left: 8px; }
  .nav-icon { width: 16px; text-align: center; font-size: 14px; }
  .sidebar-user { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 12px; }
  .user-name { color: var(--text); font-weight: 500; }
  .user-role { color: var(--text3); font-size: 11px; margin-top: 1px; }
  .btn-logout { margin-top: 8px; width: 100%; padding: 6px; background: transparent; border: 1px solid var(--border); color: var(--text2); border-radius: var(--radius); cursor: pointer; font-family: var(--sans); font-size: 12px; transition: all 0.15s; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* ---- PAGE HEADER ---- */
  .page-header { padding: 24px 24px 0; }
  .page-title { font-size: 20px; font-weight: 600; color: var(--text); }
  .page-sub { color: var(--text2); font-size: 13px; margin-top: 4px; }
  .page-content { padding: 20px 24px 40px; }

  /* ---- CARDS ---- */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; }
  .card-title { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }

  /* ---- STAT CARDS ---- */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-family: var(--mono); font-size: 22px; font-weight: 500; margin-top: 6px; }
  .stat-devise { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .stat-green { color: var(--green); }
  .stat-blue { color: var(--accent); }
  .stat-amber { color: var(--amber); }
  .stat-purple { color: var(--purple); }

  /* ---- TABLES ---- */
  .table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 14px; text-align: left; font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); background: var(--bg2); white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(79, 142, 247, 0.03); }
  .mono { font-family: var(--mono); }

  /* ---- BADGES ---- */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .badge-red { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .badge-blue { background: rgba(79,142,247,0.1); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
  .badge-purple { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
  .badge-teal { background: var(--teal-bg); color: var(--teal); border: 1px solid rgba(45,212,191,0.2); }
  .badge-gray { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

  /* ---- FORMS ---- */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); padding: 9px 12px; font-family: var(--sans); font-size: 13px;
    transition: border-color 0.15s; outline: none; width: 100%;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--bg3); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-hint { font-size: 11px; color: var(--text3); }

  /* ---- BUTTONS ---- */
  .btn { padding: 9px 18px; border-radius: var(--radius); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--border2); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* ---- LOGIN ---- */
  #login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
  .login-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px; width: 100%; max-width: 380px; }
  .login-logo { font-family: var(--mono); font-size: 16px; color: var(--accent); font-weight: 500; margin-bottom: 6px; }
  .login-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .login-sub { color: var(--text2); font-size: 13px; margin-bottom: 28px; }

  /* ---- MISC ---- */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-amber { color: var(--amber); }
  .text-muted { color: var(--text2); }
  .mt-4 { margin-top: 16px; }
  .mt-6 { margin-top: 24px; }
  .empty-state { padding: 40px 20px; text-align: center; color: var(--text3); font-size: 13px; }
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; }
  .alert-error { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .alert-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .solde-positif { color: var(--green); font-family: var(--mono); }
  .solde-zero { color: var(--text3); font-family: var(--mono); }
  .loading { color: var(--text3); font-size: 13px; padding: 20px; text-align: center; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-page" style="display:none">
  <div class="login-box">
    <div class="login-logo">TransfertPro</div>
    <div class="login-title">Connexion</div>
    <div class="login-sub">Accès réservé aux membres de l'équipe</div>
    <div id="login-error" class="alert alert-error" style="display:none"></div>
    <div class="form-group" style="margin-bottom:14px">
      <label>Sélectionnez votre profil</label>
      <select id="login-user-select">
        <option value="">Chargement...</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>Code d'accès</label>
      <input type="password" id="login-code" placeholder="••••••" autocomplete="current-password">
      <span class="form-hint">Demandez votre code à l'administrateur</span>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Se connecter</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">TransfertPro</div>
      <div class="logo-sub">Gestion des transferts</div>
    </div>
    <nav class="sidebar-nav">
      <a onclick="showPage('dashboard')" id="nav-dashboard" class="active"><span class="nav-icon">◈</span> Tableau de bord</a>
      <a onclick="showPage('nouvelle-op')" id="nav-nouvelle-op"><span class="nav-icon">+</span> Nouvelle opération</a>
      <a onclick="showPage('historique')" id="nav-historique"><span class="nav-icon">≡</span> Historique</a>
      <a onclick="showPage('soldes')" id="nav-soldes"><span class="nav-icon">◎</span> Soldes équipe</a>
      <a onclick="showPage('cloture')" id="nav-cloture"><span class="nav-icon">✓</span> Clôture du jour</a>
      <a onclick="showPage('taux')" id="nav-taux"><span class="nav-icon">⇄</span> Taux de change</a>
      <a onclick="showPage('admin')" id="nav-admin" class="nav-admin-only"><span class="nav-icon">⚙</span> Administration</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-name" id="sidebar-username">—</div>
      <div class="user-role" id="sidebar-role">—</div>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <div id="main">
    <div id="page-dashboard"></div>
    <div id="page-nouvelle-op" style="display:none"></div>
    <div id="page-historique" style="display:none"></div>
    <div id="page-soldes" style="display:none"></div>
    <div id="page-cloture" style="display:none"></div>
    <div id="page-taux" style="display:none"></div>
    <div id="page-admin" style="display:none"></div>
  </div>
</div>

<!-- ============ MODAL OPÉRATION ============ -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nouvelle opération</div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="modal-submit" onclick="submitOperation()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURATION — Remplacez ces valeurs par les vôtres
// ============================================================
const SUPABASE_URL = 'https://gpiicaaxtsmcdoyuobeh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwaWljYWF4dHNtY2RveXVvYmVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NDQzNjUsImV4cCI6MjA5NjUyMDM2NX0.2NTpTerkZGYB3YkizHVn16Dieo0fBQQ6ObJ6L8Inmbg';
const CODE_ACCES = '3538'; // Changez ce code !

// ============================================================
// INITIALISATION
// ============================================================
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let allUsers = [];
let currentModalType = null;

const DEVISES = ['USD', 'EUR', 'BIF', 'KES', 'RWF', 'CDF'];
const TYPES_OP = {
  argent_recu: { label: 'Argent reçu d\'un client', color: 'green', signe: '+' },
  envoi_employe: { label: 'Envoi à un employé', color: 'blue', signe: '→' },
  distribution_beneficiaire: { label: 'Distribution bénéficiaire', color: 'teal', signe: '→' },
  mobile_money_entrant: { label: 'Dépôt Mobile Money', color: 'purple', signe: '+' },
  mobile_money_sortant: { label: 'Retrait Mobile Money', color: 'amber', signe: '-' },
  commission: { label: 'Commission perçue', color: 'green', signe: '+' },
  depot_float: { label: 'Dépôt float employé', color: 'blue', signe: '+' },
  retrait_float: { label: 'Retrait float employé', color: 'amber', signe: '-' },
  depense: { label: 'Dépense opérationnelle', color: 'red', signe: '-' },
  conversion: { label: 'Conversion de devises', color: 'gray', signe: '⇄' }
};

function fmtMontant(v, devise) {
  if (!v && v !== 0) return '—';
  return parseFloat(v).toLocaleString('fr-FR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' ' + (devise || '');
}
function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function badgeOp(type) {
  const t = TYPES_OP[type] || { label: type, color: 'gray' };
  return `<span class="badge badge-${t.color}">${t.label}</span>`;
}

// ============================================================
// AUTH
// ============================================================
async function initApp() {
  document.getElementById('login-page').style.display = 'flex';
  const { data: users } = await sb.from('utilisateurs').select('*').eq('actif', true).order('nom');
  allUsers = users || [];
  const sel = document.getElementById('login-user-select');
  sel.innerHTML = '<option value="">-- Choisissez votre nom --</option>' +
    allUsers.map(u => `<option value="${u.id}">${u.nom} (${u.role})</option>`).join('');

  const saved = sessionStorage.getItem('tp_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    showApp();
  }
}

async function doLogin() {
  const uid = document.getElementById('login-user-select').value;
  const code = document.getElementById('login-code').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  if (!uid) { err.textContent = 'Choisissez votre profil.'; err.style.display = 'block'; return; }
  if (code !== CODE_ACCES) { err.textContent = 'Code d\'accès incorrect.'; err.style.display = 'block'; return; }
  currentUser = allUsers.find(u => u.id === uid);
  sessionStorage.setItem('tp_user', JSON.stringify(currentUser));
  showApp();
}

function doLogout() {
  sessionStorage.removeItem('tp_user');
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('login-code').value = '';
}

function showApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sidebar-username').textContent = currentUser.nom;
  document.getElementById('sidebar-role').textContent = currentUser.role === 'admin' ? 'Administrateur' : 'Agent';
  const adminLinks = document.querySelectorAll('.nav-admin-only');
  adminLinks.forEach(l => l.style.display = currentUser.role === 'admin' ? 'flex' : 'none');
  showPage('dashboard');
}

// ============================================================
// NAVIGATION
// ============================================================
function showPage(page) {
  document.querySelectorAll('#main > div').forEach(d => d.style.display = 'none');
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('page-' + page).style.display = 'block';
  const nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');
  const renderers = { dashboard: renderDashboard, 'nouvelle-op': renderNouvelleOp, historique: renderHistorique, soldes: renderSoldes, cloture: renderCloture, taux: renderTaux, admin: renderAdmin };
  if (renderers[page]) renderers[page]();
}

// ============================================================
// PAGE : TABLEAU DE BORD
// ============================================================
async function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  el.innerHTML = `<div class="page-header"><div class="page-title">Tableau de bord</div><div class="page-sub">Bonjour, ${currentUser.nom} — ${new Date().toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long'})}</div></div><div class="page-content"><div class="loading">Chargement...</div></div>`;

  const today = new Date().toISOString().split('T')[0];
  const [{ data: ops }, { data: portefeuilles }, { data: mobiles }] = await Promise.all([
    sb.from('operations').select('*').gte('cree_le', today + 'T00:00:00').order('cree_le', { ascending: false }),
    sb.from('comptes_portefeuille').select('*, utilisateurs(nom, role)'),
    sb.from('comptes_mobile_money').select('*, utilisateurs(nom)').eq('actif', true)
  ]);

  const totalRecu = (ops||[]).filter(o=>o.type_operation==='argent_recu').reduce((s,o)=>s+ parseFloat(o.montant),0);
  const totalComm = (ops||[]).filter(o=>o.type_operation==='commission').reduce((s,o)=>s+parseFloat(o.montant),0);
  const nbOps = (ops||[]).length;

  // Soldes par devise pour l'utilisateur courant
  const mesPortef = (portefeuilles||[]).filter(p=>p.utilisateur_id===currentUser.id);

  let soldesHTML = mesPortef.length === 0
    ? `<div class="empty-state">Aucun portefeuille configuré</div>`
    : mesPortef.map(p => `
      <div class="stat-card">
        <div class="stat-label">${p.devise}</div>
        <div class="stat-value stat-blue">${parseFloat(p.solde_actuel).toLocaleString('fr-FR', {minimumFractionDigits:2})}</div>
        <div class="stat-devise">Solde physique</div>
      </div>`).join('');

  let mobSoldesHTML = (mobiles||[]).filter(m=>m.utilisateur_id===currentUser.id).map(m => `
    <div class="stat-card">
      <div class="stat-label">${m.plateforme}</div>
      <div class="stat-value stat-purple">${parseFloat(m.solde_actuel).toLocaleString('fr-FR', {minimumFractionDigits:2})}</div>
      <div class="stat-devise">${m.devise} · ${m.numero}</div>
    </div>`).join('') || '';

  let recentOps = (ops||[]).slice(0,8).map(o => {
    const auteur = allUsers.find(u=>u.id===o.auteur_id);
    return `<tr>
      <td class="text-muted" style="font-size:11px">${fmtDate(o.cree_le)}</td>
      <td>${badgeOp(o.type_operation)}</td>
      <td class="mono">${fmtMontant(o.montant, o.devise_source)}</td>
      <td class="text-muted">${auteur?.nom || '—'}</td>
      <td class="text-muted" style="font-size:12px">${o.notes||'—'}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="5" class="empty-state">Aucune opération aujourd'hui</td></tr>`;

  el.innerHTML = `
  <div class="page-header">
    <div class="page-title">Tableau de bord</div>
    <div class="page-sub">Bonjour, ${currentUser.nom} — ${new Date().toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long'})}</div>
  </div>
  <div class="page-content">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Opérations aujourd'hui</div><div class="stat-value stat-blue">${nbOps}</div><div class="stat-devise">Toute l'équipe</div></div>
      <div class="stat-card"><div class="stat-label">Total reçu (USD)</div><div class="stat-value stat-green">${fmtMontant(totalRecu,'')}</div><div class="stat-devise">Aujourd'hui</div></div>
      <div class="stat-card"><div class="stat-label">Commissions</div><div class="stat-value stat-amber">${fmtMontant(totalComm,'')}</div><div class="stat-devise">Aujourd'hui</div></div>
    </div>

// MODAL OPÉRATIONS
// ============================================================
function openModal(type) {
  currentModalType = type;
  const t = TYPES_OP[type];
  document.getElementById('modal-title').textContent = t.label;
  document.getElementById('modal-body').innerHTML = buildForm(type);
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  currentModalType = null;
}

function devisesOptions(selected) {
  return DEVISES.map(d => `<option value="${d}" ${d===selected?'selected':''}>${d}</option>`).join('');
}
function usersOptions(filterRole) {
  return allUsers.filter(u => filterRole ? u.role === filterRole : true)
    .map(u => `<option value="${u.id}">${u.nom}</option>`).join('');
}

function buildForm(type) {
  const base = `
    <div class="form-grid">
      <div class="form-group">
        <label>Montant *</label>
        <input type="number" id="f-montant" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>Devise *</label>
        <select id="f-devise">${devisesOptions('USD')}</select>
      </div>
    </div>`;

  const taux = `
    <div class="form-grid" style="margin-top:10px">
      <div class="form-group">
        <label>Devise cible</label>
        <select id="f-devise-cible">${devisesOptions('BIF')}</select>
      </div>
      <div class="form-group">
        <label>Taux de change</label>
        <input type="number" id="f-taux" placeholder="ex: 2900" step="0.000001">
        <span class="form-hint">1 devise source = X devise cible</span>
      </div>
    </div>`;

  const client = `<div class="form-group" style="margin-top:10px"><label>Nom du client</label><input type="text" id="f-client" placeholder="Nom de la personne"></div>`;
  const benef = `<div class="form-group" style="margin-top:10px"><label>Nom du bénéficiaire</label><input type="text" id="f-benef" placeholder="Nom du bénéficiaire"></div>`;
  const notes = `<div class="form-group" style="margin-top:10px"><label>Notes</label><textarea id="f-notes" placeholder="Remarques..."></textarea></div>`;

  const agentSelect = `<div class="form-group" style="margin-top:10px"><label>Agent concerné</label><select id="f-agent"><option value="">-- Choisir --</option>${usersOptions('agent')}</select></div>`;
  const mobileSelect = `<div class="form-group" style="margin-top:10px"><label>Compte Mobile Money</label><select id="f-mobile"><option value="">-- Choisir --</option></select></div>`;

  const forms = {
    argent_recu: base + taux + client + notes,
    envoi_employe: base + agentSelect + notes,
    distribution_beneficiaire: base + agentSelect + benef + notes,
    mobile_money_entrant: base + mobileSelect + `<div class="form-group" style="margin-top:10px"><label>Commission perçue</label><input type="number" id="f-commission" placeholder="0.00" step="0.01" min="0"></div>` + notes,
    mobile_money_sortant: base + mobileSelect + notes,
    commission: base + notes,
    depot_float: base + agentSelect + notes,
    retrait_float: base + agentSelect + notes,
    depense: base + `<div class="form-group" style="margin-top:10px"><label>Description de la dépense</label><input type="text" id="f-client" placeholder="Loyer, transport..."></div>` + notes,
    conversion: base + taux + notes
  };

  const html = forms[type] || base + notes;

  // Charger les comptes mobile après rendu
  setTimeout(async () => {
    const sel = document.getElementById('f-mobile');
    if (!sel) return;
    const { data } = await sb.from('comptes_mobile_money').select('*, utilisateurs(nom)').eq('actif', true);
    if (data) sel.innerHTML = '<option value="">-- Choisir --</option>' + data.map(m => `<option value="${m.id}">${m.utilisateurs.nom} · ${m.plateforme} (${m.devise})</option>`).join('');
  }, 50);

  return html;
}

async function submitOperation() {
  const type = currentModalType;
  const montant = parseFloat(document.getElementById('f-montant')?.value);
  const devise = document.getElementById('f-devise')?.value;
  if (!montant || montant <= 0) { alert('Montant invalide'); return; }
  if (!devise) { alert('Devise requise'); return; }

  const op = {
    auteur_id: currentUser.id,
    type_operation: type,
    montant,
    devise_source: devise,
    devise_cible: document.getElementById('f-devise-cible')?.value || null,
    taux_change: parseFloat(document.getElementById('f-taux')?.value) || null,
    expediteur_id: currentUser.id,
    destinataire_id: document.getElementById('f-agent')?.value || null,
    compte_mobile_id: document.getElementById('f-mobile')?.value || null,
    nom_client: document.getElementById('f-client')?.value || null,
    nom_beneficiaire: document.getElementById('f-benef')?.value || null,
    notes: document.getElementById('f-notes')?.value || null
  };

  if (op.taux_change && op.devise_cible) {
    op.montant_converti = montant * op.taux_change;
    await sb.from('taux_change').insert({ saisi_par: currentUser.id, devise_de: devise, devise_vers: op.devise_cible, taux: op.taux_change });
  }

  // Si commission mobile money
  const comm = parseFloat(document.getElementById('f-commission')?.value);
  const { error } = await sb.from('operations').insert(op);
  if (error) { alert('Erreur: ' + error.message); return; }

  if (comm > 0 && type === 'mobile_money_entrant') {
    await sb.from('operations').insert({ auteur_id: currentUser.id, type_operation: 'commission', montant: comm, devise_source: devise });
  }

  closeModal();
  alert('Opération enregistrée !');
  showPage('dashboard');
}

    const ecartRows = Object.entries(ecart).map(([k,v])=>`

      ${existing.notes?`<div class="card mt-4"><div class="card-title">Notes</div><div>${existing.notes}</div></div>`:''}
    </div>`;
    return;
  }

  const portfInputs = (portf||[]).map(p=>`
    <div class="form-group">
      <label>Solde physique ${p.devise} (calculé: ${fmtMontant(p.solde_actuel,'')})</label>
      <input type="number" id="cloture-p-${p.devise}" placeholder="${parseFloat(p.solde_actuel).toFixed(2)}" step="0.01" value="${parseFloat(p.solde_actuel).toFixed(2)}">
    </div>`).join('');

  const mobInputs = (mob||[]).map(m=>`
    <div class="form-group">
      <label>Solde ${m.plateforme} ${m.devise} (calculé: ${fmtMontant(m.solde_actuel,'')})</label>
      <input type="number" id="cloture-m-${m.id}" placeholder="${parseFloat(m.solde_actuel).toFixed(2)}" step="0.01" value="${parseFloat(m.solde_actuel).toFixed(2)}">
    </div>`).join('');

  el.innerHTML = `
  <div class="page-header"><div class="page-title">Clôture du jour</div><div class="page-sub">Déclarez vos soldes réels pour valider la journée</div></div>
  <div class="page-content">
    <div class="card">
      <div class="card-title">Portefeuilles physiques</div>
      <div class="form-grid">${portfInputs||'<div class="text-muted">Aucun portefeuille configuré</div>'}</div>
    </div>
    ${mobInputs?`<div class="card mt-4"><div class="card-title">Comptes Mobile Money</div><div class="form-grid">${mobInputs}</div></div>`:''}
    <div class="card mt-4">
      <div class="card-title">Notes de clôture</div>
      <textarea id="cloture-notes" placeholder="Observations de fin de journée..."></textarea>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-primary" onclick="submitCloture(${JSON.stringify(portf||[])}, ${JSON.stringify(mob||[])})">Valider la clôture</button>
    </div>
  </div>`;
}

async function submitCloture(portf, mob) {
  const today = new Date().toISOString().split('T')[0];
  const physique = {}, mobile = {}, calcule = {}, ecart = {};

  portf.forEach(p => {
    const declare = parseFloat(document.getElementById('cloture-p-' + p.devise)?.value) || 0;
    physique[p.devise] = declare;
    calcule['physique_' + p.devise] = parseFloat(p.solde_actuel);
    ecart['physique_' + p.devise] = declare - parseFloat(p.solde_actuel);
  });
  mob.forEach(m => {
    const declare = parseFloat(document.getElementById('cloture-m-' + m.id)?.value) || 0;
    mobile[m.plateforme + '_' + m.devise] = declare;
    ecart['mobile_' + m.plateforme] = declare - parseFloat(m.solde_actuel);
  });

  const { error } = await sb.from('clotures_journalieres').insert({
    utilisateur_id: currentUser.id,
    date_cloture: today,
    solde_physique_declare: physique,
    solde_mobile_declare: mobile,
    solde_calcule: calcule,
    ecart,
    notes: document.getElementById('cloture-notes')?.value || null
  });

  if (error) { alert('Erreur: ' + error.message); return; }
  alert('Clôture enregistrée !');
  renderCloture();
}

            <div class="form-group"><label>Plateforme</label><input type="text" id="mm-plateforme" placeholder="M-Pesa, Lumicash..."></div>
            <div class="form-group"><label>Numéro</label><input type="text" id="mm-numero" placeholder="+257..."></div>
          </div>
          <div class="form-grid" style="margin-top:10px">
            <div class="form-group"><label>Devise</label><select id="mm-devise">${devisesOptions('BIF')}</select></div>
            <div class="form-group"><label>Solde initial</label><input type="number" id="mm-solde" placeholder="0.00" step="0.01"></div>
          </div>
          <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="addMobile()">Ajouter</button>
        </div>
        <div class="card mt-4">
          <div class="card-title">Comptes Mobile Money</div>
          <div class="table-wrap" style="border:none"><table><thead><tr><th>Utilisateur</th><th>Plateforme</th><th>Numéro</th><th>Statut</th></tr></thead><tbody>${mobRows}</tbody></table></div>
        </div>
      </div>
    </div>
  </div>`;
}

async function addPortefeuille() {
  const uid = document.getElementById('admin-user').value;
  const devise = document.getElementById('admin-devise').value;
  const float = parseFloat(document.getElementById('admin-float').value) || 0;
  if (!uid) { alert('Choisissez un utilisateur'); return; }
  const { error } = await sb.from('comptes_portefeuille').upsert({ utilisateur_id: uid, devise, solde_actuel: float, float_initial: float }, { onConflict: 'utilisateur_id,devise' });
  if (error) { alert('Erreur: ' + error.message); return; }
  alert('Portefeuille ajouté !');
  renderAdmin();
}

async function addMobile() {
  const uid = document.getElementById('mm-user').value;
  const plateforme = document.getElementById('mm-plateforme').value;
  const numero = document.getElementById('mm-numero').value;
  const devise = document.getElementById('mm-devise').value;
  const solde = parseFloat(document.getElementById('mm-solde').value) || 0;
  if (!uid || !plateforme || !numero) { alert('Remplissez tous les champs'); return; }
  const { error } = await sb.from('comptes_mobile_money').insert({ utilisateur_id: uid, plateforme, numero, devise, solde_actuel: solde });
  if (error) { alert('Erreur: ' + error.message); return; }
  alert('Compte Mobile Money ajouté !');
  renderAdmin();
}

// ============================================================
// DÉMARRAGE
// ============================================================
initApp();
</script>
</body>
</html>
